<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заказ создан</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center;
            align-items: center; height: 100vh; background: #fff0f5; }
        .card { background: white; padding: 40px; border-radius: 12px;
            width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .btn { background: #c2185b; color: white; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; width: 100%; margin: 8px 0;
            font-size: 14px; display: block; text-align: center;
            text-decoration: none; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="card">
    <h2>✅ Заказ создан!</h2>
    <p><b>Название:</b> <span th:text="${order.title}"></span></p>
    <p><b>Описание:</b> <span th:text="${order.description}"></span></p>
    <p th:if="${order.price != null}"><b>Цена:</b> <span th:text="${order.price}"></span></p>
    <p th:if="${order.deadline != null}"><b>Срок:</b> <span th:text="${order.deadline}"></span></p>
    <a class="btn" href="/auth">🚪 Выйти</a>
    <!--<a th:href="@{/freelancer-dashboard(name=${name})}" class="btn">-->

</div>
</body>
</html>
