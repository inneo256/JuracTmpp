<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Оплата завершена</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f2ef;
            margin: 0;
            padding: 40px;
            text-align: center;
        }

        .box {
            max-width: 600px;
            margin: 120px auto;
            background: white;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .success {
            font-size: 22px;
            color: #2ecc71;
            margin-bottom: 15px;
        }

        .message {
            font-size: 16px;
            color: #555;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #0a66c2;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn:hover {
            background: #004182;
        }
    </style>
</head>
<body>

<div class="box">

    <div class="success"> Оплата успешно выполнена</div>

    <div class="message" th:text="${message}">
        Детали оплаты
    </div>

    <p>Больше никаких действий не требуется.</p>

    <a th:href="@{/client-dashboard(name=${name})}" class="btn">Вернуться на главную</a>

</div>

</body>
</html>
