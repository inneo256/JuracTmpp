<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Портфолио фрилансера</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8eaf1;
            margin: 0;
            padding: 40px 20px;
            color: #3a2a33;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff7fb;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .hint {
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #d8a9bd;
            box-sizing: border-box;
            font-size: 14px;
            background: white;
        }

        textarea {
            resize: vertical;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 15px;
            color: white;
            background: #d86f9f;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .btn:hover {
            background: #c85d8f;
        }

        .restore {
            background: #7c5c87;
        }

        .restore:hover {
            background: #684a73;
        }

        .back {
            background: #999;
        }

        .back:hover {
            background: #777;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #f3d6e3;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📁 Моё портфолио</h1>
    <p class="hint">Здесь можно редактировать профиль и восстановить предыдущую версию</p>

    <div class="message" th:if="${message != null}" th:text="${message}"></div>

    <form action="/portfolio/save" method="post">
        <label>Описание профиля:</label>
        <textarea name="description" rows="4" placeholder="Расскажите о себе..." th:text="${portfolio.description}"></textarea>

        <label>Навыки:</label>
        <input type="text" name="skills" placeholder="Java, Spring Boot, HTML" th:value="${portfolio.skills}">

        <label>Примеры работ:</label>
        <textarea name="works" rows="4" placeholder="Опишите свои проекты..." th:text="${portfolio.works}"></textarea>

        <label>Сертификаты:</label>
        <textarea name="certificates" rows="3" placeholder="Например: Java Basic, Web Development..." th:text="${portfolio.certificates}"></textarea>

        <button type="submit" class="btn">💾 Сохранить портфолио</button>
    </form>

    <form action="/portfolio/restore" method="post">
        <button type="submit" class="btn restore">↩ Восстановить предыдущую версию</button>
    </form>

    <a href="/auth" class="btn back">⬅ Назад</a>
</div>

</body>
</html>
