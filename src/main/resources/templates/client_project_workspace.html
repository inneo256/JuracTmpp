<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Проект клиента</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8eaf1;
            margin: 0;
            padding: 40px 20px;
            color: #3a2a33;
        }

        .card {
            max-width: 700px;
            margin: 0 auto;
            background: #fff7fb;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
        }

        .status {
            background: #f3d6e3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #d8a9bd;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 15px;
            color: white;
            background: #d86f9f;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .btn:hover {
            background: #c85d8f;
        }

        .danger {
            background: #8b4b68;
        }

        .info {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #e2b8ca;
        }

        .disabled-text {
            opacity: 0.7;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>💼 Проект клиента</h2>

    <div class="status">
        Текущий статус:
        <b th:text="${project.stateName}"></b>
    </div>

    <div th:if="${project.canClientEdit()}">
        <form action="/project/save" method="post">
            <input type="text" name="projectTitle" placeholder="Название проекта"
                   th:value="${project.projectTitle}">

            <textarea name="description" rows="4"
                      placeholder="Описание проекта"
                      th:text="${project.description}"></textarea>

            <input type="text" name="advance" placeholder="Аванс"
                   th:value="${project.advance}">

            <input type="text" name="freelancerName" placeholder="Имя исполнителя"
                   th:value="${project.freelancerName}">

            <button type="submit" class="btn">✅ Создать проект и выбрать исполнителя</button>
        </form>
    </div>

    <div class="info" th:if="${!project.canClientEdit()}">
        <p><b>Название:</b> <span th:text="${project.projectTitle}"></span></p>
        <p><b>Описание:</b> <span th:text="${project.description}"></span></p>
        <p><b>Аванс:</b> <span th:text="${project.advance}"></span></p>
        <p><b>Исполнитель:</b> <span th:text="${project.freelancerName}"></span></p>
        <p><b>Отправленная часть:</b> <span th:text="${project.projectPart}"></span></p>
    </div>

    <form th:if="${project.canClientAccept()}" action="/project/accept" method="post">
        <button type="submit" class="btn">✔ Принять проект</button>
    </form>

    <form th:if="${project.canClientDispute()}" action="/project/dispute" method="post">
        <button type="submit" class="btn danger">⚠ Открыть спор</button>
    </form>

    <form th:if="${project.canClientEdit()}" action="/project/cancel" method="post">
        <button type="submit" class="btn danger">✖ Отменить проект</button>
    </form>

    <p class="disabled-text" th:if="${project.stateName == 'В работе'}">
        Проект находится в работе. Клиент ожидает отправки результата от фрилансера.
    </p>

    <p class="disabled-text" th:if="${project.stateName == 'Завершён'}">
        Проект завершён. Изменения недоступны.
    </p>

    <p class="disabled-text" th:if="${project.stateName == 'Спор'}">
        По проекту открыт спор.
    </p>

    <p class="disabled-text" th:if="${project.stateName == 'Отменён'}">
        Проект отменён.
    </p>

    <a href="/client-dashboard?name=client" class="btn">⬅ Назад в кабинет клиента</a>

</div>

</body>
</html>
