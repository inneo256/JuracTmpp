<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Кабинет фрилансера</title>
    <script th:inline="javascript">
        const themes = {
            pink: {
                background: [[${pinkTheme.background}]],
                textColor: [[${pinkTheme.textColor}]],
                buttonColor: [[${pinkTheme.buttonColor}]],
                buttonHover: [[${pinkTheme.buttonHover}]],
                cardBackground: [[${pinkTheme.cardBackground}]]
            },
            dark: {
                background: [[${darkTheme.background}]],
                textColor: [[${darkTheme.textColor}]],
                buttonColor: [[${darkTheme.buttonColor}]],
                buttonHover: [[${darkTheme.buttonHover}]],
                cardBackground: [[${darkTheme.cardBackground}]]
            }
        };
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            transition: background 0.3s, color 0.3s;
        }
        .wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .card {
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: background 0.3s;
        }
        .side-panel {
            display: none;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: background 0.3s;
            border: 2px dashed #ccc;
        }
        .btn {
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            font-size: 14px;
            display: block;
            text-align: center;
            box-sizing: border-box;
            text-decoration: none;
            transition: background 0.3s;
        }
        .clone-btn {
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 6px;
            width: auto;
            display: inline-block;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .posts-list {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .post-item {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 13px;
        }
        .post-item p { margin: 4px 0; }
    </style>
</head>
<body id="body">
<div class="wrapper">

    <div class="card" id="card">
        <h2>👨‍💻 Кабинет фрилансера</h2>
        <p>Добро пожаловать, <strong th:text="${name}"></strong>!</p>

        <input type="text" placeholder="🔍 Поиск заказов..."/>
        <button class="btn" id="actionBtn">Найти заказы</button>

        <h3>📋 Доступные заказы:</h3>
        <div class="posts-list">
            <div class="post-item" th:each="post, stat : ${posts}">
                <p><b th:text="${post.title}"></b></p>
                <p th:text="${post.description}"></p>
                <p>💰 <b th:text="${post.budget}"></b></p>
                <p>🛠 <span th:text="${post.skills}"></span></p>
                <button class="clone-btn btn"
                        th:data-title="${post.title}"
                        th:data-desc="${post.description}"
                        th:data-budget="${post.budget}"
                        th:data-skills="${post.skills}"
                        onclick="showClone(this)">
                    📋 Откликнуться на таск
                </button>
            </div>
        </div>

        <button class="btn" id="themeBtn" onclick="toggleTheme()">🎨 Сменить тему</button>
        <a class="btn" id="logoutBtn" href="/auth">🚪 Выйти</a>
    </div>

    <div class="side-panel" id="sidePanel">
        <h3>📋 Редактировать шаблон</h3>
        <p style="font-size:12px; opacity:0.7;">Измени данные и опубликуй</p>
        <label>Название:</label>
        <input type="text" id="cloneTitle"/>
        <label>Описание:</label>
        <input type="text" id="cloneDesc"/>
        <label>Бюджет:</label>
        <input type="text" id="cloneBudget"/>
        <label>Навыки:</label>
        <input type="text" id="cloneSkills"/>
        <button class="btn" id="cloneSubmit" onclick="publishClone()">✅ Опубликовать</button>
        <button class="btn" id="closePanel" onclick="closeClone()" style="opacity:0.7;">✖ Закрыть</button>
    </div>

</div>

<script>
    let currentTheme = 'pink';

    function applyTheme(themeName) {
        const t = themes[themeName];
        document.getElementById('body').style.background = t.background;
        document.getElementById('body').style.color = t.textColor;
        document.getElementById('card').style.background = t.cardBackground;
        document.getElementById('sidePanel').style.background = t.cardBackground;
        document.querySelectorAll('.btn, .clone-btn').forEach(btn => {
            btn.style.background = t.buttonColor;
        });
    }

    function toggleTheme() {
        currentTheme = currentTheme === 'pink' ? 'dark' : 'pink';
        applyTheme(currentTheme);
    }

    function showClone(btn) {
        document.getElementById('cloneTitle').value = 'Копия: ' + btn.dataset.title;
        document.getElementById('cloneDesc').value = btn.dataset.desc;
        document.getElementById('cloneBudget').value = btn.dataset.budget;
        document.getElementById('cloneSkills').value = btn.dataset.skills;
        document.getElementById('sidePanel').style.display = 'block';
        applyTheme(currentTheme);
    }

    function closeClone() {
        document.getElementById('sidePanel').style.display = 'none';
    }

    function publishClone() {
        alert('✅ Пост опубликован!');
        closeClone();
    }

    applyTheme(currentTheme);
</script>
</body>
</html>
